<script>
        document.querySelectorAll('.aspect-square.group').forEach(card => {
            card.addEventListener('click', () => {
                document.querySelectorAll('.aspect-square.group').forEach(c => {
                    c.classList.remove('border-2', 'border-primary', 'ring-2', 'ring-primary/20');
                    const check = c.querySelector('.material-symbols-outlined[style*="check_circle"]');
                    if(check) check.remove();
                });
                card.classList.add('border-2', 'border-primary', 'ring-2', 'ring-primary/20');
                const footer = card.querySelector('.absolute.bottom-2.left-2.right-2') || card.querySelector('.absolute.bottom-2.left-2');
                if(!card.querySelector('.material-symbols-outlined[style*="check_circle"]')) {
                   const checkSpan = document.createElement('span');
                   checkSpan.className = 'material-symbols-outlined text-white text-sm';
                   checkSpan.style.fontVariationSettings = "'FILL' 1";
                   checkSpan.textContent = 'check_circle';
                   if(card.querySelector('.absolute.bottom-2.left-2.right-2')) {
                       card.querySelector('.absolute.bottom-2.left-2.right-2').appendChild(checkSpan);
                   } else {
                       const wrapper = document.createElement('div');
                       wrapper.className = 'absolute bottom-2 left-2 right-2 flex justify-between items-center';
                       const originalLabel = card.querySelector('.font-label-sm');
                       wrapper.appendChild(originalLabel.cloneNode(true));
                       wrapper.appendChild(checkSpan);
                       originalLabel.remove();
                       card.appendChild(wrapper);
                   }
                }
            });
        });
    </script>
