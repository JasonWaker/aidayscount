            transition: .4s;

<script>
    function toggleCategory(btn) {
        const siblings = btn.parentElement.querySelectorAll('button');
        siblings.forEach(s => {
            s.classList.remove('active-category', 'text-white');
            s.classList.add('text-secondary');
        });
        btn.classList.add('active-category', 'text-white');
        btn.classList.remove('text-secondary');
        
        btn.style.transform = 'scale(0.95)';
        setTimeout(() => { btn.style.transform = 'scale(1)'; }, 100);
    }

    function toggleCollapsible(id) {
        const container = document.getElementById(id);
        container.classList.toggle('collapsible-active');
    }

    // Input focus styling for section headers
    document.querySelectorAll('input, textarea').forEach(el => {
        el.addEventListener('focus', () => {
            const parent = el.closest('.space-y-stack-gap-sm');
            if (parent) {
                const title = parent.querySelector('h3');
                if (title) title.classList.add('text-primary');
            }
        });
        el.addEventListener('blur', () => {
            const parent = el.closest('.space-y-stack-gap-sm');
            if (parent) {
                const title = parent.querySelector('h3');
                if (title) title.classList.remove('text-primary');
            }
        });
    });
</script>
