<script>
        // Simple micro-interaction for active category chip
        const chips = document.querySelectorAll('.custom-scrollbar button');
        chips.forEach(chip => {
            chip.addEventListener('click', () => {
                chips.forEach(c => {
                    c.classList.remove('bg-primary', 'text-on-primary');
                    c.classList.add('bg-secondary-container', 'text-on-secondary-container');
                });
                chip.classList.remove('bg-secondary-container', 'text-on-secondary-container');
                chip.classList.add('bg-primary', 'text-on-primary');
            });
        });

        // Scroll reveal animation for list items
        const observerOptions = {
            threshold: 0.1
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                }
            });
        }, observerOptions);

        document.querySelectorAll('.flex.flex-col.gap-stack-gap-md > div').forEach((card, index) => {
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';
            card.style.transition = `all 0.6s cubic-bezier(0.22, 1, 0.36, 1) ${index * 0.1}s`;
            observer.observe(card);
        });
    </script>
