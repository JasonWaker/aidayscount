<script>
        function calculateDays(targetDate) {
            const today = new Date();
            const target = new Date(targetDate);
            const diffTime = target - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            return diffDays > 0 ? diffDays : 0;
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Update countdown values
            document.getElementById('countdown-main').textContent = calculateDays('2026-02-17');
            document.getElementById('countdown-val').textContent = calculateDays('2026-02-14');
            document.getElementById('countdown-mom').textContent = calculateDays('2026-05-10');
            document.getElementById('countdown-dragon').textContent = calculateDays('2026-06-19');

            // Simple micro-interaction for cards
            const cards = document.querySelectorAll('.glass-card');
            cards.forEach(card => {
                card.addEventListener('click', function() {
                    this.style.transform = 'scale(0.98)';
                    setTimeout(() => {
                        this.style.transform = 'scale(1)';
                    }, 100);
                });
            });
        });
    </script>
