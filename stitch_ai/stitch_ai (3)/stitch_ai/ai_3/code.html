<script>
        // Simple Interaction: Change heart status
        document.querySelectorAll('button .material-symbols-outlined[data-icon="favorite"]').forEach(heart => {
            heart.closest('button').addEventListener('click', function(e) {
                e.preventDefault();
                const isFilled = heart.style.fontVariationSettings.includes("'FILL' 1");
                if (isFilled) {
                    heart.style.fontVariationSettings = "'FILL' 0";
                    heart.classList.remove('text-primary');
                    heart.classList.add('text-on-surface-variant');
                } else {
                    heart.style.fontVariationSettings = "'FILL' 1";
                    heart.classList.add('text-primary');
                    heart.classList.remove('text-on-surface-variant');
                }
            });
        });

        // Hide Header on Scroll
        let lastScrollTop = 0;
        const header = document.querySelector('header');
        window.addEventListener('scroll', () => {
            let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            if (scrollTop > lastScrollTop && scrollTop > 60) {
                header.style.transform = 'translateY(-100%)';
            } else {
                header.style.transform = 'translateY(0)';
            }
            lastScrollTop = scrollTop;
        });
    </script>
