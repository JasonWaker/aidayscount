<div class="space-y-stack-gap-sm">

<p class="px-4 pb-4 text-on-surface-variant text-body-md">
                            在首页点击底部的 "+" 按钮，即可进入创建页面。您可以自定义标题、目标日期、背景图片及分类图标。AI 将根据您的描述自动建议配色方案。
                        </p>
</div>
</div>
<!-- FAQ Item 2 -->

<span class="material-symbols-outlined text-outline group-active:text-primary transition-transform duration-300" id="faq-icon-2">expand_more</span>
</button>

                        </p>
</div>
</div>
<!-- FAQ Item 3 -->
<div class="glass-card rounded-xl overflow-hidden">
<button class="w-full px-4 py-4 flex items-center justify-between text-left group" onclick="toggleFaq(3)">

                    提交反馈

<!-- Bottom Navigation Bar -->

<script>
        function toggleFaq(id) {
            const content = document.getElementById(`faq-content-${id}`);
            const icon = document.getElementById(`faq-icon-${id}`);
            
            // Check if already open
            const isOpen = content.classList.contains('opacity-100');
            
            // Close all first (optional, for accordion effect)
            document.querySelectorAll('[id^="faq-content-"]').forEach(el => {
                el.style.maxHeight = '0';
                el.classList.remove('opacity-100', 'mt-2');
                el.classList.add('opacity-0');
            });
            document.querySelectorAll('[id^="faq-icon-"]').forEach(ic => {
                ic.style.transform = 'rotate(0deg)';
            });

            if (!isOpen) {
                content.style.maxHeight = content.scrollHeight + 'px';
                content.classList.remove('opacity-0');
                content.classList.add('opacity-100', 'mt-2');
                icon.style.transform = 'rotate(180deg)';
            }
        }

        // Active button visual feedback
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function() {
                this.classList.add('active:scale-95');
            });
        });
    </script>
