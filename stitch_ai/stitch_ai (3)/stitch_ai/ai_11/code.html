<script>
        // Toggle logic for empty state demo (purely for demonstration)
        const grid = document.getElementById('template-grid');
        const empty = document.getElementById('empty-state');
        
        // This is a simple interaction to show the empty state when search icon is clicked
        document.querySelectorAll('button').forEach(btn => {
            if(btn.querySelector('.material-symbols-outlined')?.innerText === 'search') {
                btn.addEventListener('click', () => {
                    grid.classList.toggle('hidden');
                    empty.classList.toggle('hidden');
                });
            }
        });

        // Simple parallax effect on cards
        document.querySelectorAll('.group').forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width - 0.5;
                const y = (e.clientY - rect.top) / rect.height - 0.5;
                const img = card.querySelector('img');
                if(img) {
                    img.style.transform = `scale(1.1) translate(${x * 10}px, ${y * 10}px)`;
                }
            });
            card.addEventListener('mouseleave', () => {
                const img = card.querySelector('img');
                if(img) {
                    img.style.transform = `scale(1) translate(0, 0)`;
                    img.style.transition = 'transform 0.5s ease-out';
                }
            });
        });
    </script>
