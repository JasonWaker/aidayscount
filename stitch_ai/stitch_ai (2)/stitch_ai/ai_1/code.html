<!-- Micro-interactions Script -->
<script>
        // Update time dynamically to look live
        function updateTime() {
            const now = new Date();
            const days = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const date = now.getDate();
            const day = days[now.getDay()];
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            
            document.getElementById('current-time').innerText = 
                `${year}年${month}月${date}日 ${day} ${hours}:${minutes}`;
        }
        
        setInterval(updateTime, 60000);
        updateTime();

        // Toggle location demo
        function toggleLocation() {
            const loc = document.getElementById('location-display');
            loc.classList.toggle('hidden');
        }

        // Simple text area auto-resize
        const tx = document.getElementsByTagName("textarea");
        for (let i = 0; i < tx.length; i++) {
          tx[i].setAttribute("style", "height:" + (tx[i].scrollHeight) + "px;overflow-y:hidden;");
          tx[i].addEventListener("input", OnInput, false);
        }

        function OnInput() {
          this.style.height = 0;
          this.style.height = (this.scrollHeight) + "px";
        }
    </script>




</body></html>
