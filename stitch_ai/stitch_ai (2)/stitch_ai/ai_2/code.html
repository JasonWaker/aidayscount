<script>
        // Simple Interaction for Template Selection
        const templates = document.querySelectorAll('.flex-shrink-0.w-24');
        templates.forEach(template => {
            template.addEventListener('click', () => {
                templates.forEach(t => {
                    const imgContainer = t.querySelector('.aspect-square');
                    const textLabel = t.querySelector('p');
                    imgContainer.classList.remove('border-4', 'border-primary', 'shadow-md');
                    imgContainer.classList.add('border', 'border-outline-variant/30');
                    if(textLabel) {
                        textLabel.classList.remove('text-primary', 'font-bold');
                        textLabel.classList.add('text-on-surface-variant');
                    }
                });
                const selectedImgContainer = template.querySelector('.aspect-square');
                const selectedTextLabel = template.querySelector('p');
                selectedImgContainer.classList.add('border-4', 'border-primary', 'shadow-md');
                selectedImgContainer.classList.remove('border', 'border-outline-variant/30');
                if(selectedTextLabel) {
                    selectedTextLabel.classList.add('text-primary', 'font-bold');
                    selectedTextLabel.classList.remove('text-on-surface-variant');
                }
            });
        });
    </script>
