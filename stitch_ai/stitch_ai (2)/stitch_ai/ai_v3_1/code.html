<script>
    // Micro-interaction for the timeline items appearing on scroll
    const observerOptions = {
        threshold: 0.1
    };

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('opacity-100', 'translate-y-0');
                entry.target.classList.remove('opacity-0', 'translate-y-4');
            }
        });
    }, observerOptions);

    document.querySelectorAll('.timeline-item').forEach(item => {
        item.classList.add('transition-all', 'duration-700', 'opacity-0', 'translate-y-4');
        observer.observe(item);
    });

    // Simple parallax effect for hero background
    window.addEventListener('scroll', () => {
        const scroll = window.pageYOffset;
        const heroImage = document.querySelector('section img');
        if (heroImage) {
            heroImage.style.transform = `translateY(${scroll * 0.4}px)`;
        }
    });
</script>
