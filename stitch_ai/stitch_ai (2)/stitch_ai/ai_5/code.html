<style>
        body {
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', sans-serif;
            background-color: #F5F5F7; /* Apple Style Light Gray Bg */
        }
        .glass-header {
            background: rgba(252, 248, 251, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .safe-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
        .ios-inset-grouped {
            margin: 0 20px 24px 20px;
            background: #FFFFFF;
            border-radius: 12px;
            overflow: hidden;
            border: 0.5px solid #E5E5E7;
        }
        .ios-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: white;
            transition: background 0.2s;
        }
        .ios-item:active {
            background: #F2F2F7;
        }
        .ios-divider {
            margin-left: 16px;
            height: 0.5px;
            background: #E5E5E7;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-ring {
            box-shadow: 0 0 0 2px white, 0 0 0 4px #ff8c00;
        }
        /* Custom input focus */
        input:focus {
            outline: none;
            border-bottom-color: #ff8c00 !important;
        }

</div>
</div>

<span class="material-symbols-outlined text-[20px]">check_circle</span>
            保存分类
        </button>
</footer>
<!-- Interaction Script -->
<script>
        // Simple micro-interaction for cover selection
        const coverItems = document.querySelectorAll('.ios-inset-grouped [class*="flex-none"]');
        coverItems.forEach(item => {
            item.addEventListener('click', () => {
                coverItems.forEach(i => i.classList.remove('active-ring'));
                item.classList.add('active-ring');
            });
        });

        // Simple scroll listener to change header opacity
        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            if (window.scrollY > 10) {
                header.classList.add('shadow-sm');
            } else {
                header.classList.remove('shadow-sm');
            }
        });
    </script>
